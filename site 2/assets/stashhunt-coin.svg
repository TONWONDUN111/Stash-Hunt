<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <radialGradient id="coinFace" cx="34%" cy="28%" r="92%">
      <stop offset="0%" stop-color="#FFF6CE"/>
      <stop offset="30%" stop-color="#F2CE68"/>
      <stop offset="62%" stop-color="#D4AF37"/>
      <stop offset="85%" stop-color="#9C7A22"/>
      <stop offset="100%" stop-color="#6B5316"/>
    </radialGradient>
    <linearGradient id="rimG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3C4"/>
      <stop offset="35%" stop-color="#D4AF37"/>
      <stop offset="75%" stop-color="#8A6D1E"/>
      <stop offset="100%" stop-color="#5C4712"/>
    </linearGradient>
    <radialGradient id="innerFace" cx="38%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#F7DC85"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8A6D1E"/>
    </radialGradient>
    <filter id="coinShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="embossDown" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="0.6" flood-color="#FFF6CE" flood-opacity="0.75"/>
    </filter>
    <filter id="embossUp" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="-2.5" stdDeviation="0.8" flood-color="#4A390E" flood-opacity="0.85"/>
    </filter>
  </defs>

  <!-- coin edge / reeding -->
  <g filter="url(#coinShadow)">
    <circle cx="500" cy="500" r="470" fill="url(#rimG)"/>
    <circle cx="500" cy="500" r="470" fill="none" stroke="#4A390E" stroke-width="4"/>
    <circle cx="500" cy="500" r="452" fill="none" stroke="#5C4712" stroke-width="26" stroke-dasharray="7 9" opacity=".8"/>
    <!-- main face -->
    <circle cx="500" cy="500" r="428" fill="url(#coinFace)"/>
    <circle cx="500" cy="500" r="428" fill="none" stroke="#8A6D1E" stroke-width="5"/>
    <!-- beaded border -->
    <circle cx="500" cy="500" r="404" fill="none" stroke="#B08E28" stroke-width="12" stroke-dasharray="0.5 21" stroke-linecap="round"/>
    <!-- inner recessed ring for text -->
    <circle cx="500" cy="500" r="300" fill="url(#innerFace)" stroke="#8A6D1E" stroke-width="4"/>
    <circle cx="500" cy="500" r="300" fill="none" stroke="#FFF6CE" stroke-width="2" opacity=".6" transform="translate(0 -3)"/>
    <!-- specular sweep -->
    <path d="M170 320 A 380 380 0 0 1 690 140 A 430 430 0 0 0 170 320 Z" fill="#FFF6CE" opacity=".5"/>
    <ellipse cx="330" cy="270" rx="130" ry="60" fill="#FFF6CE" opacity=".35" transform="rotate(-32 330 270)"/>
  </g>

  <!-- curved text paths -->
  <defs>
    <path id="arcTop" d="M 500,500 m -352,0 a 352,352 0 1,1 704,0"/>
    <path id="arcBottom" d="M 500,500 m -352,0 a 352,352 0 1,0 704,0"/>
  </defs>

  <!-- STASH HUNT arc top (embossed) -->
  <text font-family="Arial Black, Arial" font-weight="900" font-size="104" letter-spacing="10" fill="#8A6D1E" filter="url(#embossDown)">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">STASH HUNT</textPath>
  </text>

  <!-- bottom arc: stars + 21+ -->
  <text font-family="Arial Black, Arial" font-weight="900" font-size="62" letter-spacing="16" fill="#8A6D1E" filter="url(#embossDown)">
    <textPath href="#arcBottom" startOffset="50%" text-anchor="middle">★ CANNABIS EDITION ★</textPath>
  </text>

  <!-- center leaf, embossed -->
  <g transform="translate(500 524)">
    <g fill="#8A6D1E" filter="url(#embossUp)" transform="scale(2.35)">
      <path d="M0 -62 C 7 -40 7 -18 0 6 C -7 -18 -7 -40 0 -62 Z"/>
      <g transform="rotate(38)"><path d="M0 -56 C 6 -37 6 -16 0 4 C -6 -16 -6 -37 0 -56 Z"/></g>
      <g transform="rotate(-38)"><path d="M0 -56 C 6 -37 6 -16 0 4 C -6 -16 -6 -37 0 -56 Z"/></g>
      <g transform="rotate(72)"><path d="M0 -48 C 5 -32 5 -14 0 3 C -5 -14 -5 -32 0 -48 Z"/></g>
      <g transform="rotate(-72)"><path d="M0 -48 C 5 -32 5 -14 0 3 C -5 -14 -5 -32 0 -48 Z"/></g>
      <g transform="rotate(102)"><path d="M0 -36 C 4 -24 4 -10 0 2 C -4 -10 -4 -24 0 -36 Z"/></g>
      <g transform="rotate(-102)"><path d="M0 -36 C 4 -24 4 -10 0 2 C -4 -10 -4 -24 0 -36 Z"/></g>
      <rect x="-2.5" y="0" width="5" height="26" rx="2.5"/>
    </g>
  </g>

  <!-- small S$ mintmark and 21+ -->
  <text x="500" y="806" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="54" fill="#8A6D1E" filter="url(#embossDown)">S$ · 21+</text>
</svg>
