      <stop offset="30%" stop-color="#B06AFF"/>
      <stop offset="62%" stop-color="#9333EA"/>
      <stop offset="85%" stop-color="#6B21A8"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </radialGradient>
    <linearGradient id="rimG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D5FF"/>
      <stop offset="35%" stop-color="#9333EA"/>
      <stop offset="75%" stop-color="#6B21A8"/>
      <stop offset="100%" stop-color="#3B0764"/>
