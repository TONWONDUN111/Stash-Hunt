      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feFlood flood-color="#0891B2" flood-opacity="0.5" result="offsetcolor"/>
      <feComposite in="offsetcolor" in2="offsetblur" operator="in" result="offsetblur"/>
      <feComposite in="offsetblur" in2="SourceGraphic" operator="over"/>
    </filter>
    <path id="arcTop" d="M 500,500 m -352,0 a 352,352 0 1,1 704,0"/>
    <path id="arcBottom" d="M 500,500 m -352,0 a 352,352 0 1,0 704,0"/>
