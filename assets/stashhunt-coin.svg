    <circle cx="500" cy="500" r="428" fill="none" stroke="#6B21A8" stroke-width="5"/>
    <circle cx="500" cy="500" r="404" fill="none" stroke="#7C3AED" stroke-width="12" stroke-dasharray="0.5 21" stroke-linecap="round"/>
